services:
  underapp-db:
    image: mysql:8.4
    container_name: underapp-db
    command: --performance_schema=OFF
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - underapp-network

  underapp-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: underapp-api:latest
    restart: unless-stopped
    container_name: underapp-api
    ports:
      - "8080:8080"
    depends_on:
      underapp-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://underapp-db:3306/${DB_NAME}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_THREADS_VIRTUAL_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - underapp-network

networks:
  underapp-network:
    driver: bridge